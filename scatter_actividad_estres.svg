<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg" style="background-color: #fdfdfd; font-family: sans-serif;">
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Physical Activity vs. Stress Level</text>
  
  <line x1="60" y1="340" x2="560" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="45" y="345" font-size="11" fill="#7f8c8d" text-anchor="end">0</text>
  <line x1="60" y1="280" x2="560" y2="280" stroke="#eef2f3" stroke-width="1"/><text x="45" y="285" font-size="11" fill="#7f8c8d" text-anchor="end">2</text>
  <line x1="60" y1="220" x2="560" y2="220" stroke="#eef2f3" stroke-width="1"/><text x="45" y="225" font-size="11" fill="#7f8c8d" text-anchor="end">4</text>
  <line x1="60" y1="160" x2="560" y2="160" stroke="#eef2f3" stroke-width="1"/><text x="45" y="165" font-size="11" fill="#7f8c8d" text-anchor="end">6</text>
  <line x1="60" y1="100" x2="560" y2="100" stroke="#eef2f3" stroke-width="1"/><text x="45" y="105" font-size="11" fill="#7f8c8d" text-anchor="end">8</text>
  <line x1="60" y1="40" x2="560" y2="40" stroke="#eef2f3" stroke-width="1"/><text x="45" y="45" font-size="11" fill="#7f8c8d" text-anchor="end">10</text>
  
  <line x1="60" y1="40" x2="60" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="60" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">0</text>
  <line x1="160" y1="40" x2="160" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="160" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">20</text>
  <line x1="260" y1="40" x2="260" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="260" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">40</text>
  <line x1="360" y1="40" x2="360" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="360" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">60</text>
  <line x1="460" y1="40" x2="460" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="460" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">80</text>
  <line x1="560" y1="40" x2="560" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="560" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">100</text>

  <line x1="60" y1="340" x2="560" y2="340" stroke="#34495e" stroke-width="2"/>
  <line x1="60" y1="40" x2="60" y2="340" stroke="#34495e" stroke-width="2"/>
  
  <text x="310" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#34495e">Physical Activity Level (mins/day)</text>
  <text x="18" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#34495e" transform="rotate(-90 18,190)">Stress Level (1-10)</text>

  <circle cx="270" cy="160" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="360" cy="100" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="260" cy="130" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="410" cy="160" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="435" cy="160" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="510" cy="250" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="360" cy="190" r="5" fill="#e74c3c" opacity="0.6"/>
  <circle cx="410" cy="100" r="5" fill="#e74c3c" opacity="0.6"/>
</svg>
