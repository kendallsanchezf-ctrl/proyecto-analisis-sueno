<svg width="600" height="400" xmlns="http://www.w3.org/2000/svg" style="background-color: #fdfdfd; font-family: sans-serif;">
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2c3e50">Sleep Duration vs. Quality of Sleep</text>
  
  <line x1="60" y1="340" x2="560" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="45" y="345" font-size="11" fill="#7f8c8d" text-anchor="end">0</text>
  <line x1="60" y1="220" x2="560" y2="220" stroke="#eef2f3" stroke-width="1"/><text x="45" y="225" font-size="11" fill="#7f8c8d" text-anchor="end">4</text>
  <line x1="60" y1="100" x2="560" y2="100" stroke="#eef2f3" stroke-width="1"/><text x="45" y="105" font-size="11" fill="#7f8c8d" text-anchor="end">8</text>
  
  <line x1="60" y1="40" x2="60" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="60" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">5 h</text>
  <line x1="185" y1="40" x2="185" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="185" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">6 h</text>
  <line x1="310" y1="40" x2="310" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="310" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">7 h</text>
  <line x1="435" y1="40" x2="435" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="435" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">8 h</text>
  <line x1="560" y1="40" x2="560" y2="340" stroke="#eef2f3" stroke-width="1"/><text x="560" y="360" font-size="11" fill="#7f8c8d" text-anchor="middle">9 h</text>

  <line x1="60" y1="340" x2="560" y2="340" stroke="#34495e" stroke-width="2"/>
  <line x1="60" y1="40" x2="60" y2="340" stroke="#34495e" stroke-width="2"/>
  
  <text x="310" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#34495e">Sleep Duration (Hours)</text>
  <text x="18" y="190" text-anchor="middle" font-size="13" font-weight="bold" fill="#34495e" transform="rotate(-90 18,190)">Quality of Sleep (1-10)</text>

  <circle cx="197" cy="160" r="5" fill="#3498db" opacity="0.6"/>
  <circle cx="210" cy="160" r="5" fill="#3498db" opacity="0.6"/>
  <circle cx="172" cy="220" r="5" fill="#3498db" opacity="0.6"/>
  <circle cx="335" cy="130" r="5" fill="#3498db" opacity="0.6"/>
  <circle cx="410" cy="100" r="5" fill="#3498db" opacity="0.6"/>
  <circle cx="497" cy="70" r="5" fill="#3498db" opacity="0.6"/>
</svg>
